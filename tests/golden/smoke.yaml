general:
  stop_time: 3600
  seed: 42
  parallelism: 0
  model_unblocked_syscall_latency: true
  log_level: info
  progress: true
network:
  graph:
    type: 1_gbit_switch
experimental:
  use_dynamic_runahead: true
hosts:
  miner-001:
    network_node_id: 0
    ip_addr: 202.166.233.13
    processes:
    - path: HOME/.monerosim/bin/monerod
      args:
      - --data-dir=/tmp/monero-miner-001
      - --log-file=TMPDIR/bitmonero.log
      - --regtest
      - --keep-fakechain
      - --prep-blocks-threads=1
      - --max-concurrency=1
      - --rpc-bind-ip=202.166.233.13
      - --rpc-bind-port=18081
      - --confirm-external-bind
      - --rpc-access-control-origins=*
      - --p2p-bind-ip=202.166.233.13
      - --p2p-bind-port=18080
      - --disable-dns-checkpoints
      - --disable-seed-nodes
      environment:
        DIFFICULTY_CACHE_TTL: '30'
        GLIBC_TUNABLES: glibc.malloc.arena_max=1
        HOME: HOME
        MALLOC_ARENA_MAX: '1'
        MALLOC_MMAP_THRESHOLD_: '131072'
        MALLOC_TRIM_THRESHOLD_: '131072'
        MONERO_BLOCK_SYNC_SIZE: '1'
        MONERO_DISABLE_DNS: '1'
        PROCESS_THREADS: '1'
        PYTHONHASHSEED: '0'
        PYTHONUNBUFFERED: '1'
        SIMULATION_SEED: '42'
        VENV_SITE_PACKAGES: REPO_ROOT/venv/lib/python3.12/site-packages
      start_time: 0s
      expected_final_state: running
    - path: HOME/.monerosim/bin/monero-wallet-rpc
      args:
      - --daemon-address=http://202.166.233.13:18081
      - --rpc-bind-port=18082
      - --rpc-bind-ip=202.166.233.13
      - --disable-rpc-login
      - --trusted-daemon
      - --wallet-dir=TMPDIR/shared/miner-001_wallet
      - --shared-ringdb-dir=TMPDIR/shared/miner-001_ringdb
      - --confirm-external-bind
      - --allow-mismatched-daemon-version
      - --daemon-ssl-allow-any-cert
      environment:
        DIFFICULTY_CACHE_TTL: '30'
        GLIBC_TUNABLES: glibc.malloc.arena_max=1
        HOME: HOME
        MALLOC_ARENA_MAX: '1'
        MALLOC_MMAP_THRESHOLD_: '131072'
        MALLOC_TRIM_THRESHOLD_: '131072'
        PROCESS_THREADS: '1'
        PYTHONHASHSEED: '0'
        PYTHONUNBUFFERED: '1'
        SIMULATION_SEED: '42'
        VENV_SITE_PACKAGES: REPO_ROOT/venv/lib/python3.12/site-packages
      start_time: 2s
      expected_final_state: running
    - path: /bin/bash
      args:
      - TMPDIR/scripts/agent_miner-001_wrapper.sh
      environment:
        DIFFICULTY_CACHE_TTL: '30'
        GLIBC_TUNABLES: glibc.malloc.arena_max=1
        HOME: HOME
        MALLOC_ARENA_MAX: '1'
        MALLOC_MMAP_THRESHOLD_: '131072'
        MALLOC_TRIM_THRESHOLD_: '131072'
        PROCESS_THREADS: '1'
        PYTHONHASHSEED: '0'
        PYTHONUNBUFFERED: '1'
        SIMULATION_SEED: '42'
        VENV_SITE_PACKAGES: REPO_ROOT/venv/lib/python3.12/site-packages
      start_time: 5s
      expected_final_state: running
    - path: /bin/bash
