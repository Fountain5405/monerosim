general:
  stop_time: 21600
  seed: 12345
  parallelism: 0
  model_unblocked_syscall_latency: true
  log_level: warning
  bootstrap_end_time: 4h
  progress: true
network:
  graph:
    type: gml
    file:
      path: TMPDIR/topology.gml
  dns_server: 3.0.0.10
experimental:
  runahead: 100ms
  use_dynamic_runahead: true
  native_preemption_enabled: true
hosts:
  dnsserver:
    network_node_id: 0
    ip_addr: 3.0.0.10
    processes:
    - path: /bin/bash
      args:
      - TMPDIR/scripts/dns_server_wrapper.sh
      environment:
        DIFFICULTY_CACHE_TTL: '30'
        GLIBC_TUNABLES: glibc.malloc.arena_max=1
        HOME: HOME
        MALLOC_ARENA_MAX: '1'
        MALLOC_MMAP_THRESHOLD_: '131072'
        MALLOC_TRIM_THRESHOLD_: '131072'
        PROCESS_THREADS: '0'
        PYTHONHASHSEED: '0'
        PYTHONUNBUFFERED: '1'
        SIMULATION_SEED: '12345'
        VENV_SITE_PACKAGES: REPO_ROOT/venv/lib/python3.12/site-packages
      start_time: 1s
      expected_final_state: running
    bandwidth_down: '1000000000'
    bandwidth_up: '1000000000'
  miner-001:
    network_node_id: 0
    ip_addr: 3.0.0.11
