# Monerosim scaling test configuration
# Generated by generate_config.py
# Total hosts: 205 (5 miners + 40 users + 160 relays)
# Duration: 8h
# Network topology: gml_processing/1200_nodes_caida_with_loops.gml
#
# Activity batching (prevents thundering herd):
#   Batch size: 5 users
#   Batch interval: 2m (+/-30% jitter)
#   Total rollout: ~14m
#
# Timeline:
#   t=0:       Miners start
#   t=5s:      Relay nodes start spawning (160 nodes, 20s apart)
#   t=53m 5s:  Last relay spawns
#   t=3h:      Users spawn (staggered 5s apart)
#   t=3h 3m:  Last user spawns
#   t=4h:  Bootstrap ends (+20% buffer), distributor starts funding
#   t=5h:  Users start sending transactions (staggered over ~14m)

