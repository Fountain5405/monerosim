general:
  stop_time: 12h
  simulation_seed: 12345
  bootstrap_end_time: 8h
  enable_dns_server: true
  shadow_log_level: warning
  progress: true
  runahead: 500ms
  process_threads: 1
  native_preemption: true
  daemon_defaults:
    log-level: 1
    max-log-file-size: 0
    db-sync-mode: fastest
    no-zmq: true
    non-interactive: true
    no-igd: true
    out-peers: 3
  wallet_defaults:
    log-level: 1
network:
  path: gml_processing/1200_nodes_caida_with_loops.gml
  peer_mode: Dynamic
agents:
  miner-001:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 0s
    hashrate: 40
    can_receive_distributions: true
  miner-002:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 1s
    hashrate: 40
    can_receive_distributions: true
  miner-003:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 2s
    hashrate: 20
    can_receive_distributions: true
  user-001:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.regular_user
    start_time: 21600s
    transaction_interval: 60
    activity_start_time: 32400
    can_receive_distributions: true
  user-002:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.regular_user
    start_time: 21605s
    transaction_interval: 60
    activity_start_time: 32420
    can_receive_distributions: true
  user-003:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.regular_user
    start_time: 21610s
    transaction_interval: 60
    activity_start_time: 32440
    can_receive_distributions: true
  relay-001:
    daemon: monerod
    start_time: 2h
  relay-002:
    daemon: monerod
    start_time: 2h
  miner-distributor:
    script: agents.miner_distributor
    wait_time: 25200
    transaction_frequency: 30
  simulation-monitor:
    script: agents.simulation_monitor
    poll_interval: 300
