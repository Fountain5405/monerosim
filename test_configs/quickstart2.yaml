# Monerosim scaling test configuration
# Generated by generate_config.py
# Total hosts: 8 (5 miners + 3 users)
# Duration: 12h
# Network topology: gml_processing/1200_nodes_caida_with_loops.gml
#
# Activity batching (prevents thundering herd):
#   Batch size: 3 users
#   Batch interval: 5m (+/-30% jitter)
#   Total rollout: ~0s
#
# Timeline:
#   t=0:       Miners start
#   t=3h:      Users spawn (staggered 5s apart)
#   t=3h:  Last user spawns
#   t=8h:  Bootstrap ends (+20% buffer), distributor starts funding
#   t=9h:  Users start sending transactions (staggered over ~0s)

metadata:
  scenario: default
  generator: generate_config.py
  version: '1.0'
  agents:
    total: 8
    miners: 5
    users: 3
  timing:
    duration_s: 43200
    bootstrap_end_s: 28800
    activity_start_s: 32400
    last_user_spawn_s: 10810
  batching:
    enabled: false
    stagger_interval_s: 5
  activity_batching:
    enabled: true
    batch_size: 3
    batch_interval_s: 300
    jitter_fraction: 0.3
    total_rollout_s: 0
  settings:
    seed: 12345
    gml_topology: gml_processing/1200_nodes_caida_with_loops.gml
    fast_mode: false
general:
  stop_time: 12h
  parallelism: 0
  simulation_seed: 12345
  enable_dns_server: true
  shadow_log_level: info
  bootstrap_end_time: 8h
  progress: true
  daemon_defaults:
    log-level: 1
    max-log-file-size: 0
    db-sync-mode: fastest
    no-zmq: true
    non-interactive: true
  wallet_defaults:
    log-level: 1
network:
  path: gml_processing/1200_nodes_caida_with_loops.gml
  peer_mode: Dynamic
agents:
  miner-001:
    daemon: monerod
    wallet: 'monero-wallet-rpc'
    script: agents.autonomous_miner
    start_time: 0s
    hashrate: 25
    can_receive_distributions: true
  miner-002:
    daemon: monerod
    wallet: 'monero-wallet-rpc'
    script: agents.autonomous_miner
    start_time: 1s
    hashrate: 25
    can_receive_distributions: true
  miner-003:
    daemon: monerod
    wallet: 'monero-wallet-rpc'
    script: agents.autonomous_miner
    start_time: 2s
    hashrate: 30
    can_receive_distributions: true
  miner-004:
    daemon: monerod
    wallet: 'monero-wallet-rpc'
    script: agents.autonomous_miner
    start_time: 3s
    hashrate: 10
    can_receive_distributions: true
  miner-005:
    daemon: monerod
    wallet: 'monero-wallet-rpc'
    script: agents.autonomous_miner
    start_time: 4s
    hashrate: 10
    can_receive_distributions: true
  user-001:
    daemon: monerod
    wallet: 'monero-wallet-rpc'
    script: agents.regular_user
    start_time: 3h
    transaction_interval: 60
    activity_start_time: 32416
    tx_send_probability: 0.75
    can_receive_distributions: true
  user-002:
    daemon: monerod
    wallet: 'monero-wallet-rpc'
    script: agents.regular_user
    start_time: 10805s
    transaction_interval: 60
    activity_start_time: 32400
    tx_send_probability: 0.75
    can_receive_distributions: true
  user-003:
    daemon: monerod
    wallet: 'monero-wallet-rpc'
    script: agents.regular_user
    start_time: 10810s
    transaction_interval: 60
    activity_start_time: 32400
    tx_send_probability: 0.75
    can_receive_distributions: true
  miner-distributor:
    script: agents.miner_distributor
    wait_time: 28800
    max_transaction_amount: '2.0'
    min_transaction_amount: '0.5'
    transaction_frequency: 30
    md_n_recipients: 8
    md_out_per_tx: 2
    md_output_amount: 5.0
    md_funding_cycle_interval: 5m
  simulation-monitor:
    script: agents.simulation_monitor
    poll_interval: 300
    detailed_logging: false
    enable_alerts: true
    status_file: monerosim_monitor.log
