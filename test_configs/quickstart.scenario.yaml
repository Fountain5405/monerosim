# Quickstart test scenario — minimal config to verify monerosim works end-to-end.
# Expands to 11 agents. Runs in ~20-30 minutes wall clock time.
#
# Usage:
#   source venv/bin/activate
#   python -m scripts.scenario_parser test_configs/quickstart.scenario.yaml -o test_configs/quickstart.yaml
#   ./run_sim.sh --config test_configs/quickstart.yaml

general:
  stop_time: 6h
  simulation_seed: 12345
  bootstrap_end_time: 4h
  enable_dns_server: true
  shadow_log_level: warning
  progress: true
  runahead: 100ms
  process_threads: 0
  native_preemption: true
  daemon_defaults:
    log-level: 1
    max-log-file-size: 0
    db-sync-mode: fastest
    no-zmq: true
    non-interactive: true
  wallet_defaults:
    log-level: 1

network:
  path: gml_processing/1200_nodes_caida_with_loops.gml
  peer_mode: Dynamic

agents:
  # 5 miners — hashrates must sum to 100
  miner-{001..005}:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 0s
    start_time_stagger: 1s
    hashrate: [20, 20, 20, 20, 20]
    can_receive_distributions: true

  # 3 users — start after bootstrap, transact every 2 minutes
  user-{01..03}:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.regular_user
    start_time: 40m
    start_time_stagger: 10s
    transaction_interval: 2m
    activity_start_time: 4h
    can_receive_distributions: true

  # 1 relay — daemon-only node for network realism
  relay-001:
    daemon: monerod
    start_time: 5m

  # Fund distribution and monitoring
  miner-distributor:
    script: agents.miner_distributor
    wait_time: 70m
    transaction_frequency: 30

  simulation-monitor:
    script: agents.simulation_monitor
    poll_interval: 300
