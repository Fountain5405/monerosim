# Quickstart test scenario — minimal config to verify monerosim works end-to-end.
# Expands to 11 agents. Runs in ~20-30 minutes wall clock time.
#
# Usage:
#   source venv/bin/activate
#   python -m scripts.scenario_parser test_configs/quickstart.scenario.yaml -o test_configs/quickstart.yaml
#   ./run_sim.sh --config test_configs/quickstart.yaml

general:
  stop_time: 6h
  simulation_seed: 12345
  bootstrap_end_time: 4h
  enable_dns_server: true
  shadow_log_level: error
  progress: true
  runahead: 500ms
  process_threads: 2
  native_preemption: true
  daemon_defaults:
    log-level: monitor
    max-log-file-size: 0
    db-sync-mode: fastest
    no-zmq: true
    non-interactive: true
  wallet_defaults:
    log-level: 1

# Optional perf-tuning knobs. All commented out — current values are the
# accuracy-first defaults. Uncomment individually to trade fidelity for
# wall-time speedup. For a 1k-host run the biggest wins come from:
#
#   1. Lower monerod log volume        -> general.daemon_defaults.log-level: monitor
#                                         (was 1; curated category string that
#                                         drops bulk noise but KEEPS the lines
#                                         the live monitor + post-run analyzer
#                                         parse. Do NOT use level 0 — it
#                                         silences the block counter.)
#   2. Quieter Shadow                  -> general.shadow_log_level: error
#   3. Faster monerod per host         -> general.process_threads: 4   (breaks determinism)
#   4. Longer Shadow runahead          -> general.runahead: 500ms      (already auto-tuned)
#
# Plus one system-side knob that doesn't live in YAML:
#   5. Mount /tmp on tmpfs             -> sudo mount -t tmpfs -o size=32G tmpfs /tmp
#                                         (LMDB writes hit RAM, not disk)
#
# AVOID: performance.model_unblocked_syscall_latency: false
# It looks like a free perf win but stalls Monerosim runs at sim-time=0
# because monerod's CPU-bound startup makes too few blocking syscalls to
# advance the simulated clock. See docs/PERFORMANCE_AND_SCALE.md.
#
# See docs/PERFORMANCE_AND_SCALE.md ("Tuning monerod log-level") for the
# full breakdown of log-level options (1 / monitor / custom string / 0).
#

network:
  path: gml_processing/1200_nodes_caida_with_loops.gml
  peer_mode: Dynamic

agents:
  # 5 miners — hashrates must sum to 100
  miner-{001..005}:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 0s
    start_time_stagger: 1s
    hashrate: [20, 20, 20, 20, 20]
    can_receive_distributions: true

  # 3 users — start after bootstrap, transact every 2 minutes
  user-{01..03}:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.regular_user
    start_time: 40m
    start_time_stagger: 10s
    transaction_interval: 2m
    activity_start_time: 4h
    can_receive_distributions: true

  # 1 relay — daemon-only node for network realism
  relay-001:
    daemon: monerod
    start_time: 5m

  # Fund distribution and monitoring
  miner-distributor:
    script: agents.miner_distributor
    wait_time: 70m
    transaction_frequency: 30

  simulation-monitor:
    script: agents.simulation_monitor
    poll_interval: 300
