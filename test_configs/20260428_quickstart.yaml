general:
  stop_time: 6h
  simulation_seed: 12345
  bootstrap_end_time: 4h
  enable_dns_server: true
  shadow_log_level: error
  progress: true
  runahead: 500ms
  process_threads: 2
  native_preemption: true
  daemon_defaults:
    log-level: monitor
    max-log-file-size: 0
    db-sync-mode: fastest
    no-zmq: true
    non-interactive: true
  wallet_defaults:
    log-level: 1
network:
  path: gml_processing/1200_nodes_caida_with_loops.gml
  peer_mode: Dynamic
agents:
  miner-001:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 0s
    hashrate: 20
    can_receive_distributions: true
  miner-002:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 1s
    hashrate: 20
    can_receive_distributions: true
  miner-003:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 2s
    hashrate: 20
    can_receive_distributions: true
  miner-004:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 3s
    hashrate: 20
    can_receive_distributions: true
  miner-005:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 4s
    hashrate: 20
    can_receive_distributions: true
  user-01:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.regular_user
    start_time: 2400s
    transaction_interval: 120
    activity_start_time: 14400
    can_receive_distributions: true
  user-02:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.regular_user
    start_time: 2410s
    transaction_interval: 120
    activity_start_time: 14440
    can_receive_distributions: true
  user-03:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.regular_user
    start_time: 2420s
    transaction_interval: 120
    activity_start_time: 14480
    can_receive_distributions: true
  relay-001:
    daemon: monerod
    start_time: 5m
  miner-distributor:
    script: agents.miner_distributor
    wait_time: 4200
  simulation-monitor:
    script: agents.simulation_monitor
    poll_interval: 300
