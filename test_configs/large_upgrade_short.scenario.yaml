# 1011-node upgrade scenario, time-compressed for validation runs.
#
# Same agent count and network topology as the canonical
# 20260430_large_upgrade.scenario.yaml, but trimmed sim windows so the
# upgrade event actually fires within an affordable disk budget. Use
# this when you want to confirm fixes work at full scale, not for
# long-tail behavioral analysis.
#
# Empirical timing observed on 1011-node runs (seed 12345):
#   Bootstrap completion:    sim t≈3h27m (last batched user online)
#   Mining starts:           sim t=0 (genesis block immediate)
#   Steady-state ~17.5 blk/h
#
# Schedule (sim time):
#    0h00 - bootstrap begins; miners start mining immediately
#    3h30 - all 1000 users online (last batched user)
#    4h00 - bootstrap_end_time
#    5h00 - activity_start_time (auto = bootstrap + 1h funding period)
#    6h00 - first user/miner daemon_0_stop (1h pre-upgrade activity)
#    6h05 - first user daemon_1_start (+5min DEFAULT_DAEMON_RESTART_GAP_S)
#    7h23 - last user daemon_0_stop (1000 * 5s stagger window from 6h00)
#    7h28 - last user daemon_1_start
#    9h00 - stop_time (last user gets ~1h32m post-upgrade activity)
#
# Disk estimate at observed rate (~12 MB/agent/sim-hour daemon log):
#   daemon_logs ≈ 9 * 12 MB * 1011 ≈ 110 GB
#   shadow.data ≈ 70 GB
#   total       ≈ 180 GB
#
# REQUIRED CLI FLAG when expanding (matches canonical large_upgrade
# behavior — calibration would otherwise bump tx interval up):
#   python -m scripts.scenario_parser \
#       test_configs/large_upgrade_short.scenario.yaml \
#       -o test_configs/large_upgrade_short.yaml \
#       --no-safe-tx-interval

general:
  stop_time: 32400s                    # 9h
  simulation_seed: 12345
  bootstrap_end_time: 14400s           # 4h
  enable_dns_server: true
  shadow_log_level: error
  progress: true
  runahead: 500ms
  process_threads: 2
  daemon_defaults:
    log-level: monitor
    max-log-file-size: 0
    db-sync-mode: fastest
    no-zmq: true
    non-interactive: true
  wallet_defaults:
    log-level: 1

network:
  path: gml_processing/1200_nodes_caida_with_loops.gml
  peer_mode: Dynamic

agents:
  # 5 miners. Phase fields explicit so miners upgrade alongside users.
  miner-{001..005}:
    script: agents.autonomous_miner
    start_time: 0s
    start_time_stagger: 1s
    hashrate: [20, 20, 20, 20, 20]
    can_receive_distributions: true
    daemon_0: monerod
    daemon_0_start: auto
    daemon_0_stop: 21600s              # 6h
    daemon_1: monerod-v2
    daemon_1_start: auto
    wallet_0: monero-wallet-rpc
    wallet_0_start: auto
    wallet_0_stop: 21600s
    wallet_1: monero-wallet-rpc-v2
    wallet_1_start: auto

  # 1000 users with batched bootstrap, 5s upgrade stagger.
  # Stagger reduced from canonical 30s — at 1000 users the 30s window
  # would push the last upgrade past stop_time. The 5s stagger keeps
  # the full upgrade pipeline inside the sim window AND concentrates
  # transitions in time, which is the failure-mode risk surface.
  #
  # activity_start_time_stagger explicitly set (vs auto) because the
  # auto stagger uses compute_safe_interval (~11800s for 1000 users on
  # this hardware), which spreads activity over ~3h17m — too long for
  # this 9h sim where the upgrade fires at 6h. With 2s per user, the
  # 1000-user stagger window is ~33 min, fitting cleanly inside the
  # pre-upgrade activity window.
  user-{001..1000}:
    script: agents.regular_user
    start_time: 0s
    start_time_stagger: auto           # batched bootstrap for 1000+ users
    transaction_interval: 20m
    activity_start_time: 18000s        # 5h (explicit, no auto)
    activity_start_time_stagger: 2s    # 1000 users * 2s = 33 min stagger window
    can_receive_distributions: true
    daemon_0: monerod
    daemon_0_start: auto
    daemon_0_stop: 21600s              # 6h - first user upgrades
    daemon_0_stop_stagger: 5s          # last user at 6h + 1000*5s = 7h23m
    daemon_1: monerod-v2
    daemon_1_start: auto               # +5min after daemon_0_stop
    wallet_0: monero-wallet-rpc
    wallet_0_start: auto
    wallet_0_stop: 21600s
    wallet_0_stop_stagger: 5s
    wallet_1: monero-wallet-rpc-v2
    wallet_1_start: auto

  miner-distributor:
    script: agents.miner_distributor
    wait_time: auto

  simulation-monitor:
    script: agents.simulation_monitor
    poll_interval: 300
