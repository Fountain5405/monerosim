general:
  stop_time: 32400s
  simulation_seed: 12345
  bootstrap_end_time: 14400s
  enable_dns_server: true
  shadow_log_level: error
  progress: true
  runahead: 500ms
  process_threads: 2
  native_preemption: true
  daemon_defaults:
    log-level: monitor
    max-log-file-size: 0
    db-sync-mode: fastest
    no-zmq: true
    non-interactive: true
