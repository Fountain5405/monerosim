# Generated by ai_config for: 3 miners, 3 users, 1 relay node, running for 8 hours. ...

general:
  stop_time: 8h
  simulation_seed: 12345
  bootstrap_end_time: 4h
  enable_dns_server: true
  shadow_log_level: warning
  progress: true
  runahead: 100ms
  process_threads: 2
  daemon_defaults:
    log-level: 1
    max-log-file-size: 0
    db-sync-mode: fastest
    no-zmq: true
    non-interactive: true
    disable-rpc-ban: true
    allow-local-ip: true
  wallet_defaults:
    log-level: 1
network:
  path: gml_processing/1200_nodes_caida_with_loops.gml
  peer_mode: Dynamic
agents:
  miner-001:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 0s
    hashrate: 20
    can_receive_distributions: true
  miner-002:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 1s
    hashrate: 20
    can_receive_distributions: true
  miner-003:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 2s
    hashrate: 20
    can_receive_distributions: true
  miner-004:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 3s
    hashrate: 20
    can_receive_distributions: true
  miner-005:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.autonomous_miner
    start_time: 4s
    hashrate: 20
    can_receive_distributions: true
  user-001:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.regular_user
    start_time: 1200s
    transaction_interval: 60
    activity_start_time: 18000
    can_receive_distributions: true
  user-002:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.regular_user
    start_time: 1205s
    transaction_interval: 60
    activity_start_time: 18020
    can_receive_distributions: true
  user-003:
    daemon: monerod
    wallet: monero-wallet-rpc
    script: agents.regular_user
